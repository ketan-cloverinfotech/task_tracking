name: build-and-deploy

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show project files
        run: |
          echo "Current folder:"
          pwd
          echo "Files:"
          ls -la
          echo "package.json:"
          cat package.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          
      - name: Force public npm registry
        run: npm config set registry https://registry.npmjs.org/

      - name: Install dependencies with dev packages
        env:
          NODE_ENV: development
        run: |
          npm install --include=dev --no-audit

      - name: Ensure Vite is available
        run: |
          if [ ! -x "./node_modules/.bin/vite" ]; then
            echo "Vite missing, installing Vite now..."
            npm install --save-dev vite @vitejs/plugin-react --no-audit
          fi
          ./node_modules/.bin/vite --version

      - name: Build Vite app
        run: npm run build

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload built files
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
